source_id: urban_traffic
source_name: "Urban Traffic Volume Dataset"
description: "Daily traffic volume measurements across urban intersections"
owner: "data-engineering-team"
tags: ["traffic", "urban", "batch", "csv"]

# ─── Source Configuration ───
source_type: kaggle
format: csv
enabled: true

kaggle:
  dataset: "fedesoriano/traffic-volume-data-set"
  filename: "Metro_Interstate_Traffic_Volume.csv"
  download_path: "/opt/airflow/data/raw/traffic"

# ─── Target Configuration ───
target:
  layer: bronze
  table: bronze_urban_traffic
  database_path: "/opt/airflow/data/duckdb/urban_intelligence.duckdb"
  partition_by: "ingestion_date"

# ─── Schedule ───
schedule:
  type: cron
  expression: "0 2 * * *"   # daily at 2 AM
  catchup: false
  retries: 3
  retry_delay_minutes: 5

# ─── Schema Mapping ───
schema_mapping:
  date_time: {target: event_timestamp, type: timestamp, required: true}
  holiday: {target: holiday_name, type: varchar, required: false, default: "None"}
  temp: {target: temperature_kelvin, type: double, required: true, validation: {min: 200, max: 350}}
  rain_1h: {target: rainfall_mm, type: double, required: false, default: 0.0}
  snow_1h: {target: snowfall_mm, type: double, required: false, default: 0.0}
  clouds_all: {target: cloud_coverage_pct, type: integer, required: false}
  weather_main: {target: weather_condition, type: varchar, required: false}
  weather_description: {target: weather_description, type: varchar, required: false}
  traffic_volume: {target: traffic_volume, type: integer, required: true, validation: {min: 0, max: 100000}}

# ─── Data Quality Rules ───
quality_checks:
  - check_type: not_null
    columns: [event_timestamp, traffic_volume]
  - check_type: unique
    columns: [event_timestamp]
  - check_type: value_range
    column: traffic_volume
    min: 0
    max: 100000
  - check_type: freshness
    column: event_timestamp
    max_age_hours: 48

# ─── Additional Metadata ───
metadata:
  data_classification: public
  pii_contains: false
  update_frequency: daily
  expected_row_count_min: 1000
  expected_row_count_max: 500000
